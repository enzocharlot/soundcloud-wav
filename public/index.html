<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundcloud WAV</title>
  <meta name="description"
    content="Download YouTube and SoundCloud audio as high-quality WAV files. Dark, minimal, fast." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #090909;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-h: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.10);
      --border-h: rgba(255, 255, 255, 0.22);
      --text: #f0f0f0;
      --text-muted: rgba(255, 255, 255, 0.38);
      --text-sub: rgba(255, 255, 255, 0.55);
      --accent: #a78bfa;
      /* soft violet */
      --accent-2: #c4b5fd;
      --error: #f87171;
      --success: #34d399;
      --radius: 18px;
      --radius-sm: 10px;
      --blur: 20px;
      --trans: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Ambient background glow ──────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(139, 92, 246, 0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(99, 102, 241, 0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ───────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    .card {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 32px;

      /* entrance animation */
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      text-align: center;
    }

    .logo {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 200;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1.1;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 60%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* Animated dot */
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 6px;
      vertical-align: middle;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    /* ── Glass panel ──────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(var(--blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── URL input ────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    #url-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 300;
      padding: 13px 16px;
      outline: none;
      transition: border-color var(--trans), background var(--trans), box-shadow var(--trans);
    }

    #url-input::placeholder {
      color: var(--text-muted);
    }

    #url-input:focus {
      border-color: rgba(167, 139, 250, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
    }

    /* ── Download button ──────────────────────────────────── */
    #download-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-sm);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 0.01em;
      padding: 0 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--trans), border-color var(--trans), box-shadow var(--trans), transform 0.15s;
    }

    #download-btn:hover:not(:disabled) {
      background: rgba(130, 100, 240, 0.18);
      border-color: rgba(167, 139, 250, 0.45);
      box-shadow: 0 0 22px rgba(139, 92, 246, 0.22), 0 0 0 1px rgba(167, 139, 250, 0.15) inset;
    }

    #download-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    #download-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 16px;
      line-height: 1;
    }

    /* ── Error message ────────────────────────────────────── */
    #error-msg {
      display: none;
      font-size: 13px;
      color: var(--error);
      background: rgba(248, 113, 113, 0.07);
      border: 1px solid rgba(248, 113, 113, 0.18);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      line-height: 1.5;
    }

    #error-msg.visible {
      display: block;
    }

    /* ── Progress section ─────────────────────────────────── */
    #progress-section {
      display: none;
      flex-direction: column;
      gap: 18px;
    }

    #progress-section.visible {
      display: flex;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .progress-pct {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-sub);
    }

    /* Overall bar */
    .progress-track {
      height: 3px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 50%, #c7d2fe 100%);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    /* Shimmer on bar */
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.35) 50%, transparent 100%);
      animation: shimmer 1.8s infinite;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(250%);
      }
    }

    /* Status text */
    #status-text {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-sub);
      min-height: 20px;
    }

    /* ── Track list ───────────────────────────────────────── */
    #track-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .track-item {
      display: flex;
      flex-direction: column;
      gap: 7px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .track-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .track-title {
      font-size: 13px;
      font-weight: 300;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .track-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .track-badge.downloading {
      background: rgba(99, 102, 241, 0.18);
      color: #a5b4fc;
    }

    .track-badge.converting {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
    }

    .track-badge.done {
      background: rgba(52, 211, 153, 0.12);
      color: var(--success);
    }

    .track-badge.error {
      background: rgba(248, 113, 113, 0.12);
      color: var(--error);
    }

    .track-badge.pending {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
    }

    .track-bar-track {
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .track-bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .track-bar-fill.downloading {
      background: linear-gradient(90deg, #6366f1, #a78bfa);
    }

    .track-bar-fill.converting {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
    }

    .track-bar-fill.done {
      background: linear-gradient(90deg, #10b981, #34d399);
    }

    .track-error-msg {
      font-size: 11.5px;
      color: var(--error);
      opacity: 0.8;
    }

    /* ── ZIP download button ──────────────────────────────────── */
    #zip-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #zip-section.visible {
      display: flex;
    }

    #zip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.12) 0%, rgba(16, 185, 129, 0.08) 100%);
      border: 1px solid rgba(52, 211, 153, 0.30);
      border-radius: var(--radius-sm);
      color: var(--success);
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--trans), border-color var(--trans), box-shadow var(--trans), transform 0.15s;
      animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #zip-btn:hover {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.20) 0%, rgba(16, 185, 129, 0.14) 100%);
      border-color: rgba(52, 211, 153, 0.50);
      box-shadow: 0 0 24px rgba(52, 211, 153, 0.18), 0 0 0 1px rgba(52, 211, 153, 0.12) inset;
      transform: translateY(-1px);
    }

    #zip-btn:active {
      transform: scale(0.98);
    }

    .zip-icon {
      font-size: 20px;
      line-height: 1;
    }

    .zip-info {
      font-size: 11.5px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* Zipping spinner state */
    #zipping-msg {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-sub);
    }

    #zipping-msg.visible {
      display: flex;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(167, 139, 250, 0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Donate button ────────────────────────────────────── */
    .donate-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: rgba(251, 113, 133, 0.08);
      border: 1px solid rgba(251, 113, 133, 0.22);
      border-radius: 99px;
      color: #fda4af;
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      transition: background var(--trans), border-color var(--trans), transform 0.15s, box-shadow var(--trans);
    }

    .donate-btn:hover {
      background: rgba(251, 113, 133, 0.15);
      border-color: rgba(251, 113, 133, 0.42);
      box-shadow: 0 0 18px rgba(251, 113, 133, 0.15);
      transform: translateY(-1px);
    }

    .donate-btn:active {
      transform: scale(0.97);
    }

    .donate-heart {
      font-size: 13px;
      animation: heartbeat 2.2s ease-in-out infinite;
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      14% {
        transform: scale(1.25);
      }

      28% {
        transform: scale(1);
      }

      42% {
        transform: scale(1.15);
      }

      56% {
        transform: scale(1);
      }
    }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 11.5px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .panel {
        padding: 20px 16px;
      }

      .input-row {
        flex-direction: column;
      }

      #download-btn {
        padding: 13px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="card">

      <!-- Header -->
      <header class="header">
        <h1 class="logo">Soundcloud <span>WAV</span><span class="dot"></span></h1>
        <p class="subtitle">YouTube &amp; SoundCloud Converter</p>
      </header>

      <!-- Input panel -->
      <div class="panel">
        <div class="input-row">
          <input type="text" id="url-input" placeholder="Paste YouTube or SoundCloud URL…" autocomplete="off"
            spellcheck="false" aria-label="YouTube or SoundCloud URL" />
          <button id="download-btn" type="button" aria-label="Download">
            <span class="btn-icon">↓</span>
            Download
          </button>
        </div>

        <!-- Error -->
        <div id="error-msg" role="alert"></div>

        <!-- Progress -->
        <div id="progress-section" aria-live="polite">
          <div>
            <div class="progress-header">
              <span class="progress-label">Overall Progress</span>
              <span class="progress-pct" id="overall-pct">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="overall-bar"></div>
            </div>
          </div>

          <p id="status-text"></p>
          <div id="track-list"></div>

          <!-- Zipping indicator -->
          <div id="zipping-msg">
            <div class="spinner"></div>
            <span>Compressing tracks into ZIP…</span>
          </div>

          <!-- ZIP download -->
          <div id="zip-section">
            <a id="zip-btn" href="#" download>
              <span class="zip-icon">📦</span>
              <span>Download ZIP</span>
            </a>
            <span class="zip-info" id="zip-info"></span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <a class="donate-btn" href="https://paypal.me/enzocharlot" target="_blank" rel="noopener" id="donate-link">
          <span class="donate-heart">♥</span>
          Support this project
        </a>
        <p style="margin-top:10px;">Powered by Trankilo &nbsp;·&nbsp; Audio exported as 44.1 kHz 16-bit PCM WAV</p>
      </footer>

    </div>
  </main>

  <script>
    /* ── DOM refs ─────────────────────────────────────────── */
    const urlInput = document.getElementById('url-input');
    const downloadBtn = document.getElementById('download-btn');
    const errorMsg = document.getElementById('error-msg');
    const progressSec = document.getElementById('progress-section');
    const overallBar = document.getElementById('overall-bar');
    const overallPct = document.getElementById('overall-pct');
    const statusText = document.getElementById('status-text');
    const trackList = document.getElementById('track-list');
    const zipSection = document.getElementById('zip-section');
    const zipBtn = document.getElementById('zip-btn');
    const zipInfo = document.getElementById('zip-info');
    const zippingMsg = document.getElementById('zipping-msg');

    /* ── State ────────────────────────────────────────────── */
    let currentEs = null;   // EventSource
    let trackCount = 0;
    let tracksCompleted = 0;
    const trackEls = {};    // index -> { el, bar, badge }
    const trackProgress = {}; // index -> percent (download phase)

    /* ── Utilities ────────────────────────────────────────── */
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    function setStatus(msg) {
      statusText.textContent = msg;
    }

    function setOverall(pct) {
      const p = Math.round(Math.min(100, Math.max(0, pct)));
      overallBar.style.width = p + '%';
      overallPct.textContent = p + '%';
    }

    function reset() {
      hideError();
      trackList.innerHTML = '';
      zipSection.classList.remove('visible');
      zippingMsg.classList.remove('visible');
      zipBtn.href = '#';
      zipInfo.textContent = '';
      trackCount = 0;
      tracksCompleted = 0;
      Object.keys(trackEls).forEach(k => delete trackEls[k]);
      Object.keys(trackProgress).forEach(k => delete trackProgress[k]);
      setOverall(0);
      setStatus('');
      progressSec.classList.remove('visible');
    }

    /* ── Track element factory ───────────────────────────── */
    function createTrackEl(index, title) {
      const item = document.createElement('div');
      item.className = 'track-item';
      item.style.animationDelay = (index * 0.04) + 's';

      const header = document.createElement('div');
      header.className = 'track-header';

      const titleEl = document.createElement('span');
      titleEl.className = 'track-title';
      titleEl.textContent = title;

      const badge = document.createElement('span');
      badge.className = 'track-badge pending';
      badge.textContent = 'Pending';

      header.append(titleEl, badge);

      const barTrack = document.createElement('div');
      barTrack.className = 'track-bar-track';
      const barFill = document.createElement('div');
      barFill.className = 'track-bar-fill downloading';
      barTrack.appendChild(barFill);

      item.append(header, barTrack);
      trackList.appendChild(item);

      trackEls[index] = { el: item, bar: barFill, badge, barTrack, titleEl };
      return trackEls[index];
    }

    function setBadge(index, state, text) {
      const t = trackEls[index];
      if (!t) return;
      t.badge.className = `track-badge ${state}`;
      t.badge.textContent = text;
    }

    function setTrackTitle(index, title) {
      const t = trackEls[index];
      if (!t || !title) return;
      t.titleEl.textContent = title;
    }

    function setTrackBar(index, pct, cls) {
      const t = trackEls[index];
      if (!t) return;
      t.bar.className = `track-bar-fill ${cls}`;
      t.bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
    }

    /* ── Main submit handler ─────────────────────────────── */
    async function handleSubmit() {
      const url = urlInput.value.trim();
      if (!url) { showError('Please enter a URL.'); return; }

      // Close any previous SSE
      if (currentEs) { currentEs.close(); currentEs = null; }
      reset();

      downloadBtn.disabled = true;
      progressSec.classList.add('visible');
      setStatus('Connecting…');

      let jobId;
      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) { throw new Error(data.error || 'Server error.'); }
        jobId = data.jobId;
      } catch (err) {
        showError(err.message);
        progressSec.classList.remove('visible');
        downloadBtn.disabled = false;
        return;
      }

      /* Open SSE stream */
      const es = new EventSource(`/api/progress/${jobId}`);
      currentEs = es;

      es.onmessage = (e) => {
        let ev;
        try { ev = JSON.parse(e.data); } catch { return; }
        handleEvent(ev, jobId);
      };

      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return; // normal close
        showError('Connection lost. The server may be unavailable.');
        downloadBtn.disabled = false;
        es.close();
      };
    }

    /* ── SSE event handler ───────────────────────────────── */
    function handleEvent(ev, jobId) {
      switch (ev.type) {
        case 'status':
          setStatus(ev.message);
          break;

        case 'total':
          trackCount = ev.total;
          break;

        case 'track_title': {
          setTrackTitle(ev.index, ev.title);
          setStatus(`Downloading track ${ev.index + 1} of ${trackCount}: ${ev.title}`);
          break;
        }

        case 'track_start': {
          setStatus(`Downloading track ${ev.index + 1} of ${ev.total}: ${ev.title}`);
          createTrackEl(ev.index, ev.title);
          setBadge(ev.index, 'downloading', 'Downloading');
          break;
        }

        case 'track_progress': {
          trackProgress[ev.index] = ev.percent;
          if (ev.stage === 'download') {
            setTrackBar(ev.index, ev.percent, 'downloading');
          } else if (ev.stage === 'converting') {
            setBadge(ev.index, 'converting', 'Converting');
            setTrackBar(ev.index, ev.percent, 'converting');
          }
          // Recalculate overall
          recalcOverall();
          break;
        }

        case 'track_done': {
          setBadge(ev.index, 'done', 'Done');
          setTrackBar(ev.index, 100, 'done');
          tracksCompleted++;
          trackProgress[ev.index] = 100;
          recalcOverall();
          break;
        }

        case 'track_error': {
          setBadge(ev.index, 'error', 'Error');
          tracksCompleted++;
          const t = trackEls[ev.index];
          if (t) {
            const errEl = document.createElement('p');
            errEl.className = 'track-error-msg';
            errEl.textContent = ev.error;
            t.el.appendChild(errEl);
          }
          recalcOverall();
          break;
        }

        case 'zipping': {
          setStatus('Compressing tracks into ZIP…');
          zippingMsg.classList.add('visible');
          break;
        }

        case 'done': {
          zippingMsg.classList.remove('visible');
          setOverall(100);
          downloadBtn.disabled = false;
          if (currentEs) { currentEs.close(); currentEs = null; }

          if (ev.zipReady) {
            const trackWord = ev.files.length !== 1 ? 'tracks' : 'track';
            setStatus(`✓ ${ev.files.length} ${trackWord} compressed and ready.`);
            zipBtn.href = `/api/zip/${jobId}`;
            zipBtn.download = `playlist_${jobId.slice(0, 8)}.zip`;
            zipInfo.textContent = `${ev.files.length} WAV file${ev.files.length !== 1 ? 's' : ''} inside`;
            zipSection.classList.add('visible');
            // Auto-trigger download
            setTimeout(() => {
              const a = document.createElement('a');
              a.href = zipBtn.href;
              a.download = zipBtn.download;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            }, 400);
          } else if (ev.files && ev.files.length > 0) {
            setStatus(`✓ ${ev.files.length} track${ev.files.length !== 1 ? 's' : ''} downloaded. ZIP creation failed.`);
            if (ev.zipError) showError(`ZIP error: ${ev.zipError}`);
          } else {
            setStatus('⚠ No tracks could be downloaded.');
          }
          break;
        }

        case 'error': {
          showError(ev.error || 'An unknown error occurred.');
          progressSec.classList.remove('visible');
          downloadBtn.disabled = false;
          if (currentEs) { currentEs.close(); currentEs = null; }
          break;
        }
      }
    }

    /* ── Recalculate overall bar ─────────────────────────── */
    function recalcOverall() {
      if (trackCount === 0) return;
      const indices = Object.keys(trackProgress).map(Number);
      const sum = indices.reduce((acc, i) => acc + (trackProgress[i] || 0), 0);
      const pct = (sum / (trackCount * 100)) * 100;
      setOverall(pct);
    }

    /* ── Event listeners ─────────────────────────────────── */
    downloadBtn.addEventListener('click', handleSubmit);

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSubmit();
    });

    urlInput.addEventListener('input', hideError);
  </script>
</body>
